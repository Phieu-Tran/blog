name: Weekly Sync

on:
  schedule:
    # Mỗi thứ 2 lúc 23:00 UTC (6:00 sáng UTC+7)
    - cron: '0 23 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync all data
        env:
          MAL_USERNAME: ${{ vars.MAL_USERNAME }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_SESSION_ID: ${{ secrets.TMDB_SESSION_ID }}
          TMDB_ACCOUNT_ID: ${{ vars.TMDB_ACCOUNT_ID }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ vars.STEAM_ID }}
        run: node src/scripts/sync-all.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: weekly sync $(date +%Y-%m-%d)"
            git push
          fi
