name: Sync Media Data

on:
  schedule:
    # Chạy hàng ngày lúc 23:00 UTC (6:00 sáng UTC+7)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync MAL anime list
        if: ${{ vars.MAL_USERNAME != '' }}
        run: npm run sync-mal -- ${{ vars.MAL_USERNAME }}

      - name: Sync TMDB films
        if: ${{ secrets.TMDB_API_KEY != '' }}
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_LIST_ID: ${{ vars.TMDB_LIST_ID }}
        run: npm run sync-tmdb

      - name: Fetch missing metadata
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: npm run fetch-data

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/
          if git diff --staged --quiet; then
            echo "Không có thay đổi."
          else
            git commit -m "chore: auto sync media data $(date +%Y-%m-%d)"
            git push
          fi
